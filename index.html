<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ── */
    :root {
      --ink:      #0f0f0f;
      --paper:    #f7f5f0;
      --muted:    #6b6860;
      --accent:   #1a4fff;
      --rule:     #e0ddd6;
      --mono:     'JetBrains Mono', monospace;
      --serif:    'DM Serif Display', serif;
      --sans:     'Inter', sans-serif;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      font-weight: 300;
    }
 
    /* ── LAYOUT ── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 28px;
    }
 
    section { padding: 80px 0; border-top: 1px solid var(--rule); }
 
    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 245, 240, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
    }
 
    nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
 
    .nav-name {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-decoration: none;
    }
 
    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
 
    .nav-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
 
    .nav-links a:hover { color: var(--ink); }
 
    /* ── HERO ── */
    #hero {
      border-top: none;
      padding: 100px 0 80px;
    }
 
    .eyebrow {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
 
    h1 {
      font-family: var(--serif);
      font-size: clamp(44px, 8vw, 72px);
      line-height: 1.08;
      font-weight: 400;
      margin-bottom: 24px;
      letter-spacing: -0.01em;
    }
 
    h1 em {
      font-style: italic;
      color: var(--muted);
    }
 
    .hero-bio {
      font-size: 18px;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.65;
      margin-bottom: 36px;
    }
 
    .cta-group {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
 
    .btn {
      display: inline-block;
      padding: 11px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      cursor: pointer;
    }
 
    .btn:hover { opacity: 0.82; transform: translateY(-1px); }
 
    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }
 
    .btn-ghost {
      border: 1px solid var(--rule);
      color: var(--ink);
    }
 
    /* ── SECTION HEADERS ── */
    h2 {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 36px;
      letter-spacing: -0.01em;
    }
 
    /* ── ABOUT ── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }
 
    .about-text p + p { margin-top: 16px; }
 
    .about-text p { color: #3d3c3a; line-height: 1.72; }
 
    .about-facts { display: flex; flex-direction: column; gap: 16px; }
 
    .fact {
      padding: 16px 0;
      border-bottom: 1px solid var(--rule);
    }
 
    .fact-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
 
    .fact-value { font-size: 15px; font-weight: 400; }
 
    /* ── WORK / PROJECTS ── */
    .projects { display: flex; flex-direction: column; gap: 0; }
 
    .project {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 28px 0;
      border-bottom: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s;
    }
 
    .project:first-child { border-top: 1px solid var(--rule); }
    .project:hover { opacity: 0.65; }
 
    .project-name {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 6px;
    }
 
    .project-desc {
      font-size: 14px;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.55;
    }
 
    .project-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
 
    .tag {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 2px;
      background: var(--rule);
      color: var(--muted);
    }
 
    .project-arrow {
      font-size: 20px;
      color: var(--muted);
      margin-top: 4px;
    }
 
    /* ── EXPERIENCE ── */
    .experience { display: flex; flex-direction: column; gap: 32px; }
 
    .exp-item { display: grid; grid-template-columns: 120px 1fr; gap: 24px; }
 
    .exp-period {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      padding-top: 3px;
      line-height: 1.5;
    }
 
    .exp-role { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
 
    .exp-company { color: var(--accent); font-size: 14px; margin-bottom: 8px; }
 
    .exp-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }
 
    /* ── CONTACT ── */
    .contact-intro {
      font-size: 18px;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.65;
      margin-bottom: 36px;
    }
 
    .links-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
 
    .link-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }
 
    .link-item:hover { color: var(--accent); border-color: var(--accent); }
 
    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 28px 0;
    }
 
    footer .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
 
    .footer-note {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 620px) {
      .about-grid { grid-template-columns: 1fr; }
      .exp-item { grid-template-columns: 1fr; gap: 4px; }
      footer .container { flex-direction: column; gap: 8px; text-align: center; }
    }
 
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
</html>
